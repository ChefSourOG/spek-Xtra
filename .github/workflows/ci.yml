name: CI
run-name: CI
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  HOMEBREW_NO_ANALYTICS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  Build-Debian-x86_64:
    name: Build Spek-Xtra (Debian, x86_64)
    runs-on: ubuntu-latest
    container: debian:sid
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt update
          apt full-upgrade -y
          apt install -y g++ make pkg-config libtool intltool gettext autopoint libwxgtk3.2-dev wx-common libavcodec-dev libavformat-dev
      - name: Compile and bundle application
        run: |
          mkdir -p ./dist/debian/spek-x/usr ./dist/debian/spek-x/DEBIAN
          ./autogen.sh --prefix="$(realpath ./dist/debian/spek-x/usr)"
          make -j2 && make install
          cp ./dist/debian/control.ci ./dist/debian/spek-x/DEBIAN/control
          dpkg-deb --build dist/debian/spek-x
          mv dist/debian/spek-x.deb dist/debian/spek-xtra_1.0.0_amd64.deb
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Spek-Xtra (Debian, x86_64)
          path: ${{ github.workspace }}/dist/debian/spek-xtra_1.0.0_amd64.deb

  Build-Windows-x64:
    name: Build Spek-Xtra (Windows, x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            zip
      - name: Build dependencies
        run: ./dist/win/install_deps.sh
      - name: Compile and bundle application
        run: ./dist/win/bundle.sh
      - name: Archive ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spek-Xtra (Windows, x64)
          path: ${{ github.workspace }}/dist/win/Spek-Xtra/Spek-Xtra.zip
      - name: Archive EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spek-Xtra (Windows, x64, exe)
          path: ${{ github.workspace }}/dist/win/Spek-Xtra/spek-xtra.exe

  Build-macOS-Intel:
    name: Build Spek-Xtra (macOS, Intel)
    runs-on: macos-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          eval "$(brew shellenv)"
          brew unlink perl
          cd '${{ github.workspace }}' && ARCH=x86_64 ./dist/osx/install_deps.sh
      - name: Compile and bundle application
        run: |
          eval "$(brew shellenv)"
          cd '${{ github.workspace }}' && ARCH=x86_64 ./dist/osx/bundle.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Spek-Xtra (macOS, Intel)
          path: ${{ github.workspace }}/dist/osx/Spek-Xtra.x86_64.tgz

  Build-macOS-AppleSilicon:
    name: Build Spek-Xtra (macOS, Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          eval "$(brew shellenv)"
          brew unlink perl
          cd '${{ github.workspace }}' && ARCH=arm64 ./dist/osx/install_deps.sh
      - name: Compile and bundle application
        run: |
          eval "$(brew shellenv)"
          cd '${{ github.workspace }}' && ARCH=arm64 ./dist/osx/bundle.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Spek-Xtra (macOS, Apple Silicon)
          path: ${{ github.workspace }}/dist/osx/Spek-Xtra.arm64.tgz

  Build-macOS-Universal:
    name: Build Spek-Xtra (macOS, Universal)
    runs-on: macos-latest
    needs:
      - Build-macOS-Intel
      - Build-macOS-AppleSilicon
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Download Spek-Xtra (macOS, Intel)
        uses: actions/download-artifact@v4
        with:
          name: Spek-Xtra (macOS, Intel)
          path: ${{ github.workspace }}/dist/osx/
      - name: Download Spek-Xtra (macOS, Apple Silicon)
        uses: actions/download-artifact@v4
        with:
          name: Spek-Xtra (macOS, Apple Silicon)
          path: ${{ github.workspace }}/dist/osx/
      - name: Bundle application
        run: |
          eval "$(brew shellenv)"
          cd '${{ github.workspace }}' && ./dist/osx/bundle_universal.sh merge_only
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Spek-Xtra (macOS, Universal)
          path: ${{ github.workspace }}/dist/osx/Spek-Xtra.tgz

  Unit-Test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container: debian:sid
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt update
          apt full-upgrade -y
          apt install -y g++ make pkg-config libtool intltool gettext autopoint libwxgtk3.2-dev wx-common libavcodec-dev libavformat-dev
      - name: Run tests
        run: |
          ./autogen.sh && make check

  Release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - Build-Windows-x64
      - Build-Debian-x86_64
      - Build-macOS-Universal
      - Unit-Test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: Spek-Xtra (Windows, x64)
          path: ./artifacts/windows-zip/
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: Spek-Xtra (Windows, x64, exe)
          path: ./artifacts/windows-exe/
      - name: Download Debian package
        uses: actions/download-artifact@v4
        with:
          name: Spek-Xtra (Debian, x86_64)
          path: ./artifacts/debian/
      - name: Download macOS universal bundle
        uses: actions/download-artifact@v4
        with:
          name: Spek-Xtra (macOS, Universal)
          path: ./artifacts/macos/
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp ./artifacts/windows-zip/Spek-Xtra.zip release/spek-xtra-1.0.0-windows-x86_64.zip
          cp ./artifacts/windows-exe/spek-xtra.exe release/spek-xtra-1.0.0-windows-x86_64.exe
          cp ./artifacts/debian/spek-xtra_1.0.0_amd64.deb release/spek-xtra_1.0.0_amd64.deb
          cp ./artifacts/macos/Spek-Xtra.tgz release/spek-xtra-1.0.0-macos-universal.tgz
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE-NOTES.md
          generate_release_notes: false
